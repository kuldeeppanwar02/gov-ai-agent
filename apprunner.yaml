version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r gov-ai-agent/requirements.txt
      - python -m playwright install chromium
run:
  command: cd gov-ai-agent && uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: PYTHONPATH
      value: /app
    - name: AWS_REGION
      value: us-east-1
