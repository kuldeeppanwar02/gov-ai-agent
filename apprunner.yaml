version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - pip install --upgrade pip
    build:
      - pip install -r gov-ai-agent/requirements.txt
      - python -m playwright install chromium
      - python -m playwright install-deps chromium
run:
  command: cd gov-ai-agent && uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: PYTHONPATH
      value: /app/gov-ai-agent
